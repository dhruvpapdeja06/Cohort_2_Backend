<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
</head>
<body style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background-color: rgb(53, 194, 187);">
    <div class="root">
        <h1 style="color: rgb(221, 40, 27);">CHAT APP</h1>
        <div id="msgDisplay" style="background-color: whitesmoke;width: 50vw; height: 50vh; border-radius: 1rem;" ></div>
        <input id="message" type="text" placeholder="Type your message here" style="background-color: rgb(237, 252, 105); border: none; border-radius: .5rem; height: 2rem; width: 49vw; margin-top: 1rem; padding: .5rem;">
        <br>
        <button onclick="sendMessage()" style="margin-top: .5rem; width: 4rem; border: none; padding: .25rem; background-color: rgb(96, 77, 204); border-radius: .2rem; color: white;">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 

        // socket connect --> 
        //socket.on('connect',()=>{
        //    console.log(socket.id); // undefined becuase it will take some time to connect and give the data
      //  })

      const messageBox = document.getElementById('msgDisplay');
      const messageInput = document.getElementById('message');

      function sendMessage(){
        const msg = messageInput.value;
        console.log(msg);
        socket.emit('message',msg);
        messageInput.value = "";
      }

      socket.on('new-message',(data)=>{
        const element = document.createElement('div');
        element.textContent = data;
        messageBox.appendChild(element);
      })
       
    </script>
    

</body>
</html>
